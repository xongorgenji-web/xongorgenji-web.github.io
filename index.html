<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GenjiStore — Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#f4f6f9;padding-bottom:80px}

header{background:#000;color:#fff;padding:14px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;color:#d4af37}

.search-box{background:#fff;margin:12px;padding:12px;border-radius:16px}
.search-box input{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd}

.categories{display:flex;gap:10px;padding:0 12px 10px;overflow-x:auto}
.category{padding:8px 14px;background:#fff;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.category.active{background:#9c27b0;color:#fff}

.products{padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.product{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.12);cursor:pointer}
.product img{width:100%;aspect-ratio:1/1;object-fit:cover}
.product-body{padding:8px}
.price{font-weight:700;color:#d4af37}

#productModal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;z-index:1000}
.box{background:#fff;max-width:420px;margin:40px auto;border-radius:18px;overflow:hidden;position:relative}

.close-btn{position:absolute;top:10px;right:10px;background:#000;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}

.slider{display:flex;overflow-x:auto;background:#000}
.slider img{width:100%;object-fit:contain}

.content{padding:14px}

.popup-buttons{display:flex;gap:10px;margin-top:16px}
.popup-buttons button{flex:1;padding:14px;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer}
.cart-btn{background:#eee}
.buy-btn{background:#9c27b0;color:#fff}

.buy-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;display:none;border-top:1px solid #ddd}
.buy-bar button{flex:1;padding:16px;font-size:16px;border:none;font-weight:700}
.cart{background:#eee}
.buy{background:#9c27b0;color:#fff}
</style>
</head>

<body>

<header>
  <div class="logo">👑 GENJISTORE</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="search-box">
  <input id="searchName" placeholder="Search product">
</div>

<div class="categories">
  <div class="category active" data-cat="">All</div>
  <div class="category" data-cat="Phones">Phones</div>
  <div class="category" data-cat="Clothes">Clothes</div>
  <div class="category" data-cat="Electronics">Electronics</div>
  <div class="category" data-cat="Furniture">Furniture</div>
  <div class="category" data-cat="Second Hand">Second Hand</div>
  <div class="category" data-cat="Shoes">Shoes</div>
  <div class="category" data-cat="Cosmetics">Cosmetics</div>
</div>

<div class="products" id="productList"></div>

<!-- PRODUCT MODAL -->
<div id="productModal" onclick="closeProduct()">
  <div class="box" onclick="event.stopPropagation()">

    <button class="close-btn" onclick="closeProduct()">✖</button>

    <div id="pmSlider" class="slider"></div>

    <div class="content">
      <h3 id="pmName"></h3>
      <div id="pmPrice" class="price"></div>
      <p id="pmLocation"></p>
      <div id="pmCondition"></div>

      <!-- ✅ BUTTONS INSIDE POPUP -->
      <div class="popup-buttons">
        <button class="cart-btn" onclick="addToCart()">🛒 Add to Cart</button>
        <button class="buy-btn" onclick="chat()">⚡ Buy Now</button>
      </div>

    </div>
  </div>
</div>

<!-- FLOATING BUY BAR -->
<div class="buy-bar" id="buyBar">
  <button class="cart" onclick="addToCart()">🛒 Add to Cart</button>
  <button class="buy" onclick="chat()">⚡ Buy Now</button>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCk8AopowtdPEZeYXsnEiT1o85kngAgG0Y",
  authDomain:"genji-store.firebaseapp.com",
  projectId:"genji-store"
});

const db = firebase.firestore();
const auth = firebase.auth();

let selectedCategory = "";
let currentProduct = null;

/* CATEGORY */
document.querySelectorAll(".category").forEach(cat=>{
  cat.onclick = ()=>{
    document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
    cat.classList.add("active");
    selectedCategory = cat.dataset.cat;
    loadProducts();
  }
});

/* SEARCH */
searchName.oninput = loadProducts;

/* LOAD PRODUCTS */
function loadProducts(){
  db.collection("products")
    .where("status","==","available")
    .onSnapshot(snap=>{

      productList.innerHTML="";
      const search = searchName.value.toLowerCase();

      snap.forEach(doc=>{
        const p = doc.data();

        if(selectedCategory && p.category !== selectedCategory) return;
        if(search && !p.name.toLowerCase().includes(search)) return;

        productList.innerHTML += `
          <div class="product" onclick='openProduct(${JSON.stringify({...p,id:doc.id})})'>
            <img src="${p.image}">
            <div class="product-body">
              <div>${p.name}</div>
              <div class="price">₹${p.price}</div>
            </div>
          </div>`;
      });
    });
}

/* OPEN PRODUCT */
function openProduct(p){
  currentProduct = p;

  pmName.innerText = p.name;
  pmPrice.innerText = "₹" + p.price;
  pmLocation.innerText = "📍 " + (p.village || "");
  pmCondition.innerText = p.condition === "Second Hand" ? "♻️ Second Hand" : "🆕 Brand New";

  pmSlider.innerHTML = "";
  (p.images || [p.image]).forEach(url=>{
    pmSlider.innerHTML += `<img src="${url}">`;
  });

  productModal.style.display = "block";
  buyBar.style.display = "flex";
}

/* CLOSE */
function closeProduct(){
  productModal.style.display = "none";
  buyBar.style.display = "none";
}

/* CART */
function addToCart(){
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(currentProduct);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart 🛒");
}

/* BUY */
function chat(){
  const msg = encodeURIComponent(`Hi, I want to buy ${currentProduct.name} — ₹${currentProduct.price}`);

  if(currentProduct.contact)
    window.open(`https://wa.me/91${currentProduct.contact}?text=${msg}`);
  else alert("Seller contact not available");
}

/* LOGOUT */
function logout(){
  auth.signOut().then(()=>location.replace("login.html"));
}

loadProducts();
</script>

</body>
</html>
